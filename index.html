<title>Wayfarer · Amsterdam & Cologne</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;min-height:-webkit-fill-available;background:#FAF7F0;font-family:'Cormorant Garamond',Georgia,serif;}
body{overflow:hidden;}
.card{transition:transform 0.15s ease,box-shadow 0.15s ease;}
.card:active{transform:scale(0.99);}
.btn-tap:active{opacity:0.75;}
.ph:active{background:#E2F0EF!important;}
@keyframes up{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideLeft{from{transform:translateX(-100%);}to{transform:translateX(0);}}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes locpulse{0%,100%{box-shadow:0 0 0 3px rgba(74,144,217,0.3);}50%{box-shadow:0 0 0 8px rgba(74,144,217,0.08);}}
::-webkit-scrollbar{display:none;}
.desktop-sidebar{display:none;}
@media(min-width:768px){
  .desktop-action-bar{display:flex!important;gap:8px;padding:16px 32px 0;flex-shrink:0;}
  .mobile-only{display:none!important;}
  .desktop-sidebar{display:flex!important;flex-direction:column;width:210px;flex-shrink:0;background:#F0EAE0;border-right:0.5px solid #DDD5C4;overflow-y:auto;}
  .desktop-content{display:flex;flex:1;overflow:hidden;}
  .desktop-timeline-wrap{flex:1;overflow-y:auto;padding:24px 0 80px;}
  .timeline-inner{max-width:680px;margin:0 auto;padding:0 32px;}
  .tl-item-title{font-size:21px!important;}
  .tl-item-note{font-size:15px!important;}
  .tl-item-time{font-size:13px!important;}
  .day-heading-title{font-size:38px!important;}
  .day-heading-summary{font-size:19px!important;}
  .map-day-btn{font-size:17px!important;padding:12px 20px!important;}
  .tl-badge-text{font-size:12px!important;}
}
@media(max-width:767px){
  .desktop-content{display:flex;flex:1;flex-direction:column;overflow:hidden;}
  .desktop-timeline-wrap{flex:1;overflow-y:auto;padding:16px 16px calc(120px + env(safe-area-inset-bottom));}
  .timeline-inner{width:100%;}
}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  .no-print{display:none!important;}
  html,body,#root{height:auto!important;overflow:visible!important;}
  @page{margin:12mm;}
}
</style>

function MapOverlay({items,focusId,title,onClose}){

    const lat=fi?.lat||52.374; const lng=fi?.lng||4.89;
